version: "3.3"


services:
  hanbooking-next:
    container_name: hanbooking-next
    restart: always 
    image: node:20.19.5
    ports:
      - 4000:3000
    environment:
      - PORT=3000

    volumes:
      - ./:/usr/src/hanbooking-next
    working_dir: /usr/src/hanbooking-next
    
    networks:
      - client-network

      # FOR PRODUCTION
    command: bash -c "yarn && yarn run build && yarn run start"

networks:
  client-network:
    driver: bridge